<section class="portfolio section">
  <div class="container-page">
    <div class="portfolio__head">
      <app-section-heading
        [eyebrow]="'portfolio.eyebrow' | t"
        [title]="'portfolio.title' | t"
        [lead]="'portfolio.lead' | t"
      ></app-section-heading>
      <p-button
        [label]="'portfolio.cta' | t"
        styleClass="p-button-outlined"
        routerLink="/contact"
      ></p-button>
    </div>

    <ul class="portfolio__grid" role="list">
      @for (work of works; track work.title; let i = $index) {
        <li class="work-card" appReveal="fade-up" [revealDelay]="(i % 3) * 120">
          <figure class="work-card__media">
            <img [src]="work.image" [alt]="work.title" loading="lazy" decoding="async" />
          </figure>
          <div class="work-card__overlay">
            <span class="work-card__cat">{{ work.categoryKey | t }}</span>
            <h3 class="work-card__title">{{ work.title }}</h3>
          </div>
        </li>
      }
    </ul>
  </div>
</section>
