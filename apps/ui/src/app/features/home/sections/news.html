<section class="news section">
  <div class="container-page">
    <app-section-heading
      align="center"
      [eyebrow]="'news.eyebrow' | t"
      [title]="'news.title' | t"
      [lead]="'news.lead' | t"
    ></app-section-heading>

    <ul class="news__grid" role="list">
      @for (article of articles; track article.titleKey; let i = $index) {
        <li class="article-card" appReveal="fade-up" [revealDelay]="i * 120">
          <figure class="article-card__media">
            <img [src]="article.image" [alt]="article.titleKey | t" loading="lazy" decoding="async" />
          </figure>
          <div class="article-card__body">
            <div class="article-card__meta">
              <span class="article-card__cat">{{ article.categoryKey | t }}</span>
              <span class="article-card__date">{{ article.date }}</span>
            </div>
            <h3 class="article-card__title">{{ article.titleKey | t }}</h3>
            <p class="article-card__excerpt">{{ article.excerptKey | t }}</p>
            <a href="#" class="article-card__link">
              {{ 'news.readMore' | t }} <i class="pi pi-arrow-right"></i>
            </a>
          </div>
        </li>
      }
    </ul>
  </div>
</section>
