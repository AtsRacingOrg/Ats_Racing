<section class="newsletter" aria-labelledby="newsletter-title">
  <div class="container-page newsletter__grid">
    <div>
      <p class="newsletter__eyebrow">{{ 'newsletter.eyebrow' | t }}</p>
      <h2 id="newsletter-title" class="newsletter__title">
        {{ 'newsletter.titlePre' | t }} <span class="accent">{{ 'newsletter.titleAccent' | t }}</span> {{ 'newsletter.titlePost' | t }}
      </h2>
    </div>

    <form class="newsletter__form" (ngSubmit)="submit()">
      <div class="newsletter__field">
        <label for="newsletter-email" class="sr-only">{{ 'auth.email' | t }}</label>
        <input
          id="newsletter-email"
          pInputText
          type="email"
          [placeholder]="'newsletter.placeholder' | t"
          autocomplete="email"
          [formControl]="email"
        />
      </div>
      <p-button type="submit" [label]="'newsletter.submit' | t"></p-button>
      @if (submitted()) {
        <p class="newsletter__ok" role="status">{{ 'newsletter.ok' | t }}</p>
      } @else if (email.touched && email.invalid) {
        <p class="newsletter__err" role="alert">{{ 'newsletter.err' | t }}</p>
      }
    </form>
  </div>
</section>
