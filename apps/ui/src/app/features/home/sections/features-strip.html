<section class="care">
  <div class="care__top">
    <div class="care__copy" appReveal="fade-right">
      <h2 class="care__title">{{ 'care.title' | t }}</h2>
      <p class="care__lead">
        {{ 'care.lead' | t }}
      </p>
      <a routerLink="/about" class="care__more">
        <span>{{ 'care.more' | t }}</span>
        <span class="care__more-bar" aria-hidden="true"></span>
      </a>
    </div>

    <div class="care__hero" aria-hidden="true" appReveal="fade-left" [revealDelay]="100">
      <img
        src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=1400&q=80"
        alt=""
        loading="lazy"
        decoding="async"
      />
    </div>
  </div>

  <div class="care__bottom">
    <div class="care__photo" aria-hidden="true" appReveal="fade-right">
      <img
        src="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2?auto=format&fit=crop&w=1200&q=80"
        alt=""
        loading="lazy"
        decoding="async"
      />
    </div>
    <div class="care__pillars" appReveal="fade-left" [revealDelay]="120">
      @for (p of pillars; track p.titleKey) {
        <section class="pillar">
          <h3>{{ p.titleKey | t }}</h3>
          <p>{{ p.textKey | t }}</p>
        </section>
      }
    </div>
  </div>
</section>
