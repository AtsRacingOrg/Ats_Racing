<section class="customize">
  <div class="customize__inner">
    <div class="customize__media" aria-hidden="true" appReveal="fade-left">
      <img
        class="customize__img customize__img--main"
        src="https://images.unsplash.com/photo-1494976388531-d1058494cdd8?auto=format&fit=crop&w=1100&q=80"
        alt=""
        loading="lazy"
        decoding="async"
      />
      <img
        class="customize__img customize__img--accent"
        src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=700&q=80"
        alt=""
        loading="lazy"
        decoding="async"
      />
    </div>

    <div class="customize__copy" appReveal="fade-right" [revealDelay]="100">
      <h2 class="customize__title">
        {{ 'customize.titlePre' | t }} <span class="accent">{{ 'customize.titleAccent' | t }}</span>
      </h2>
      <p class="customize__lead">
        {{ 'customize.lead' | t }}
      </p>
      <p-button [label]="'customize.cta' | t" routerLink="/about"></p-button>
    </div>
  </div>
</section>
