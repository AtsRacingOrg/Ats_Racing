<section class="stats" aria-label="Rakamlarla Ats Racing">
  <div class="container-page">
    <ul class="stats__grid" role="list">
      @for (stat of stats; track stat.labelKey; let i = $index) {
        <li class="stat" appReveal="fade-up" [revealDelay]="i * 120">
          <span class="stat__value">
            @if (stat.display) {
              {{ stat.display }}
            } @else {
              <span [appCountUp]="stat.value" [suffix]="stat.suffix"></span>
            }
          </span>
          <span class="stat__label">{{ stat.labelKey | t }}</span>
        </li>
      }
    </ul>
  </div>
</section>
