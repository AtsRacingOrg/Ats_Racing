<section class="ahero" aria-labelledby="ahero-title">
  <div class="ahero__bg" aria-hidden="true"></div>
  <div class="ahero__overlay" aria-hidden="true"></div>

  <div class="ahero__inner">
    <p class="ahero__eyebrow">{{ 'about.hero.eyebrow' | t }}</p>
    <h1 id="ahero-title" class="ahero__title">
      <span class="ahero__line ahero__line--1">{{ 'about.hero.line1' | t }}</span>
      <span class="ahero__line ahero__line--2">{{ 'about.hero.line2' | t }}</span>
    </h1>
    <p class="ahero__lead">
      {{ 'about.hero.lead' | t }}
    </p>

    <ul class="ahero__meta" aria-label="Öne çıkan rakamlar">
      <li>
        <span class="ahero__meta-num">27+</span>
        <span class="ahero__meta-lbl">{{ 'about.hero.m1' | t }}</span>
      </li>
      <li>
        <span class="ahero__meta-num">1.2M+</span>
        <span class="ahero__meta-lbl">{{ 'about.hero.m2' | t }}</span>
      </li>
      <li>
        <span class="ahero__meta-num">2.4K</span>
        <span class="ahero__meta-lbl">{{ 'about.hero.m3' | t }}</span>
      </li>
    </ul>
  </div>

  <app-shape-divider
    variant="wave"
    position="bottom"
    color="#ffffff"
    midColor="rgba(255, 255, 255, 0.5)"
    backColor="rgba(255, 255, 255, 0.22)"
    [animated]="true"
  ></app-shape-divider>
</section>
