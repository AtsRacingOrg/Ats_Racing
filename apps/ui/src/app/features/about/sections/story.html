<section class="story section">
  <div class="container-page story__grid">
    <div class="story__media" appReveal="fade-left">
      <img
        src="https://images.unsplash.com/photo-1486006920555-c77dcf18193c?auto=format&fit=crop&w=1100&q=80"
        alt="Ats Racing atölyesi"
        loading="lazy"
        decoding="async"
      />
      <div class="story__badge">
        <span class="story__badge-num">27+</span>
        <span class="story__badge-lbl">{{ 'about.story.badge' | t }}</span>
      </div>
    </div>

    <div class="story__copy" appReveal="fade-right" [revealDelay]="100">
      <app-section-heading
        [eyebrow]="'about.story.eyebrow' | t"
        [title]="'about.story.title' | t"
      ></app-section-heading>

      <p>
        {{ 'about.story.p1' | t }}
      </p>
      <p>
        {{ 'about.story.p2' | t }}
      </p>

      <ul class="story__bullets">
        <li><i class="pi pi-check-circle"></i> {{ 'about.story.b1' | t }}</li>
        <li><i class="pi pi-check-circle"></i> {{ 'about.story.b2' | t }}</li>
        <li><i class="pi pi-check-circle"></i> {{ 'about.story.b3' | t }}</li>
        <li><i class="pi pi-check-circle"></i> {{ 'about.story.b4' | t }}</li>
      </ul>
    </div>
  </div>
</section>
