<section class="values section">
  <div class="container-page">
    <app-section-heading
      align="center"
      [eyebrow]="'about.values.eyebrow' | t"
      [title]="'about.values.title' | t"
      [lead]="'about.values.lead' | t"
    ></app-section-heading>

    <ul class="values__grid" role="list">
      @for (v of values; track v.titleKey; let i = $index) {
        <li class="value-card" appReveal="fade-up" [revealDelay]="i * 120">
          <span class="value-card__icon" aria-hidden="true"><i [class]="v.icon"></i></span>
          <h3 class="value-card__title">{{ v.titleKey | t }}</h3>
          <p class="value-card__text">{{ v.textKey | t }}</p>
        </li>
      }
    </ul>
  </div>
</section>
