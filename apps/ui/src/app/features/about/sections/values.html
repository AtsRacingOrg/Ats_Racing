<section class="values section">
  <div class="container-page">
    <app-section-heading
      align="center"
      eyebrow="Değerlerimiz"
      title="İşimizi Şekillendiren İlkeler"
      lead="Her aracı kendi aracımız gibi gördüğümüzde, sonuç hem dayanıklı hem güvenilir oluyor."
    ></app-section-heading>

    <ul class="values__grid" role="list">
      @for (v of values; track v.title; let i = $index) {
        <li class="value-card" appReveal="fade-up" [revealDelay]="i * 120">
          <span class="value-card__icon" aria-hidden="true"><i [class]="v.icon"></i></span>
          <h3 class="value-card__title">{{ v.title }}</h3>
          <p class="value-card__text">{{ v.text }}</p>
        </li>
      }
    </ul>
  </div>
</section>
